<!DOCTYPE html>
<html>
<head>
    <title>AnyChat Settings</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                <h2>AnyChat</h2>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggleExtension" checked>
                <span class="slider round"></span>
            </label>
        </header>

        <div class="action-section">
            <button id="startChatBtn" class="primary-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                Start Chat
            </button>
        </div>

        <div class="settings-group">
            <label for="aiModeSelect">AI Persona Mode</label>
            <select id="aiModeSelect">
                <option value="Conversational">Conversational (Default)</option>
                <option value="Friendly">Friendly</option>
                <option value="Neutral">Neutral</option>
                <option value="Interview">Interview Mode</option>
                <option value="Challenging">Challenging</option>
                <option value="Aggressive">Aggressive</option>
            </select>
            <small style="color:#6b7280; font-size:10px; display:block; margin-top:4px;">Appends hidden mood instructions to your voice.</small>
        </div>

        <div class="settings-group">
            <label for="voiceSelect">Native Fallback Voice</label>
            <select id="voiceSelect">
                <!-- Populated by JS -->
            </select>
        </div>

        <div class="settings-group api-group">
            <label for="groqApiKey">Groq API Key (Optional)</label>
            <input type="password" id="groqApiKey" placeholder="gsk_..." class="api-input">
            <small style="color:#6b7280; font-size:10px; display:block; margin-top:4px;">When set, the AI will use Groq's cinematic voices instead of your computer's native voice.</small>
        </div>

        <div class="settings-group">
            <div class="label-row">
                <label for="speechRate">Speaking Speed</label>
                <span id="rateValue">1.0x</span>
            </div>
            <input type="range" id="speechRate" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>

        <div class="settings-group">
            <label class="checkbox-container">
                <input type="checkbox" id="summarizationEnabled">
                <span class="checkmark"></span>
                Summarize long sections (Coming Soon)
            </label>
        </div>
        
        <footer>
            Works on ChatGPT, Gemini & Claude.
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
